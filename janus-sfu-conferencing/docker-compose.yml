version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mediaserver_dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mediaserver2024
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  janus-gateway:
    image: canyan/janus-gateway:latest
    container_name: janus-gateway
    ports:
      - "8088:8088"
      - "8188:8188"
      - "10000-10200:10000-10200/udp"
    volumes:
      - "./janus/janus.dev.jcfg:/usr/local/etc/janus/janus.jcfg"
    networks:
      - app-network
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    network_mode: host
    volumes:
      - ./coturn/turnserver.dev.conf:/etc/coturn/turnserver.conf
    restart: unless-stopped
    # intentionally NOT on app-network — host mode is incompatible with bridge networks

volumes:
  postgres_data_dev:

networks:
  app-network:
    driver: bridge
